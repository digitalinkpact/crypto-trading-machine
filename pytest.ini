[pytest]
asyncio_mode = auto
testpaths = tests
# Money-handling code: every warning is a TEST FAILURE by default. A deprecated
# pandas / numpy / pydantic API used in our own code (app.*) must never sail
# through CI silently and then break trade execution after a `pip` upgrade.
#
# Rules:
#   * `error` first => all warnings (Deprecation, Pending, User, ...) become
#     errors. Later, more specific lines override it (pytest: last match wins).
#   * Only NARROW, per-library escape valves are allowed below. A blanket
#     `ignore::DeprecationWarning` is forbidden and guarded against in
#     tests/test_pytest_config_safety.py.
filterwarnings =
    error
    # vectorbt drags in deprecated numpy/pandas internals at import time; we are
    # pinned to numpy==1.26.4 for it and cannot fix upstream, so scope the
    # ignore to the library's own modules only (anchored so it can't match an
    # unrelated package that merely starts with the same letters).
    ignore::DeprecationWarning:vectorbt(\.|$)
    ignore::PendingDeprecationWarning:vectorbt(\.|$)
    # Optional TA libs: pandas_ta is intentionally unpinned/optional and `ta`
    # is the deterministic fallback. Their internal deprecations are not ours.
    ignore::DeprecationWarning:pandas_ta(\.|$)
    ignore::DeprecationWarning:ta(\.|$)
    # numpy-internal shim deprecations triggered indirectly by the libs above.
    # This only silences warnings attributed to numpy itself; a deprecated numpy
    # call in app.* is attributed to app.* and still fails the build.
    ignore::DeprecationWarning:numpy(\.|$)
